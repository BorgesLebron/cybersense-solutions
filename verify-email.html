<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/BorgesLebron/hectorborges-portfolio/main/assets/csicon.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/BorgesLebron/hectorborges-portfolio/main/assets/csicon.png">
<title>Verify Email — CyberSense.Solutions</title>
<meta name="description" content="Email verification for CyberSense.Solutions">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="auth.css">
<style>
  body { background: var(--cs-navy); min-height: 100vh; display: flex; flex-direction: column; }
  .verify-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .verify-wrap::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .verify-card {
    background: var(--cs-blue-dark);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: var(--radius-lg);
    padding: 48px 44px;
    width: 100%;
    max-width: 440px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .verify-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 24px;
  }
  .icon-loading { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.25); }
  .icon-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); }
  .icon-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25); }
  .verify-title { font-size: 22px; font-weight: 700; color: var(--cs-white); margin-bottom: 10px; }
  .verify-sub { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; margin-bottom: 28px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(0,212,255,0.2);
    border-top-color: #00d4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width:480px) { .verify-card { padding: 32px 20px; } }
</style>
</head>
<body>
<nav class="nav" role="navigation">
  <a href="index.html" class="nav-wordmark">CyberSense<span>.Solutions</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="newsletter.html">Newsletter</a></li>
    <li><a href="radar.html">Radar</a></li>
  </ul>
  <button class="nav-login" onclick="CS.Auth.showLoginModal()">Login</button>
  <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
</nav>
<div class="nav-drawer" id="nav-drawer">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="newsletter.html">Newsletter</a></li>
    <li><a href="radar.html">Radar</a></li>
  </ul>
  <a href="#" class="drawer-login" onclick="CS.Auth.showLoginModal();return false;">Login</a>
</div>

<div class="verify-wrap">
  <div class="verify-card" id="verify-card">
    <div class="verify-icon icon-loading" id="verify-icon">
      <div class="spinner"></div>
    </div>
    <div class="verify-title" id="verify-title">Verifying your email…</div>
    <div class="verify-sub" id="verify-sub">Please wait a moment.</div>
  </div>
</div>

<script>window.CS_API_BASE = 'https://api.cybersense.solutions';</script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const icon  = document.getElementById('verify-icon');
  const title = document.getElementById('verify-title');
  const sub   = document.getElementById('verify-sub');

  if (!token) {
    icon.className  = 'verify-icon icon-error';
    icon.innerHTML  = '✕';
    title.textContent = 'Invalid link';
    sub.textContent   = 'This verification link is missing a token. Please check your email and try again, or request a new verification link.';
    return;
  }

  try {
    const res = await fetch(`${window.CS_API_BASE}/api/auth/verify-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (res.ok && data.access_token) {
      localStorage.setItem('cs_token', data.access_token);
      icon.className  = 'verify-icon icon-success';
      icon.innerHTML  = '✓';
      title.textContent = 'Email verified!';
      sub.innerHTML     = 'Your account is now active. Redirecting you to the platform…';
      setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    } else {
      throw new Error(data.error?.message || 'Verification failed');
    }
  } catch(e) {
    icon.className  = 'verify-icon icon-error';
    icon.innerHTML  = '✕';
    title.textContent = 'Verification failed';
    sub.innerHTML     = `${e.message}<br><br><a href="index.html" style="color:var(--cs-cyan);">Return to home</a>`;
  }
})();
</script>
</body>
</html>
